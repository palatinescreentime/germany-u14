<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a6b2f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Team Manager">
<link rel="manifest" id="pwa-manifest">
<title>Germany U14 · Season Manager</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a6b2f;--gd:#124d22;--gl:#e8f5ec;
  --gold:#e6a817;--red:#c0392b;--blue:#2980b9;
  --bg:#f0f4f1;--white:#fff;--text:#1a1a1a;--muted:#666;
  --border:#d0d8d2;--r:8px;
}
body{font-family:-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
*{-webkit-tap-highlight-color:transparent}
button{font-family:inherit}

.hd{background:var(--g);color:#fff;padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hd h1{font-size:15px;font-weight:700;flex:1;letter-spacing:.3px}
.hd-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 11px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.back-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;line-height:1}

.tabs{display:flex;background:var(--gd);overflow-x:auto}
.tab{flex:1;min-width:64px;padding:10px 4px;background:none;border:none;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:#fff;border-bottom-color:var(--gold)}
.tab.locked{opacity:.4;cursor:not-allowed;pointer-events:none}

.score-card{background:var(--gl);border-radius:var(--r);padding:16px;margin-top:14px;border:1.5px solid var(--g)}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.score-team{flex:1;font-size:13px;font-weight:700;color:var(--g)}
.score-in{width:64px;padding:10px;border:1.5px solid var(--border);border-radius:6px;font-size:22px;font-weight:700;text-align:center;color:var(--text)}
.score-sep{font-size:22px;font-weight:700;color:var(--muted)}
.score-display{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 4px}
.score-num{font-size:36px;font-weight:700;color:var(--g)}
.score-vs{font-size:20px;color:var(--muted);font-weight:400}
.score-teams{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-top:4px}
.final-badge{display:inline-block;background:var(--g);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

.content{padding:14px 14px 90px;max-width:860px;margin:0 auto}
.card{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:11px;font-weight:700;color:var(--g);margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}

.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.gc{background:#fff;border-radius:var(--r);padding:13px 11px;border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s}
.gc:hover,.gc:active{border-color:var(--g)}
.gc.live{border-color:#e74c3c;border-width:2px}
.gc.complete{background:var(--gl)}
.gc .gnum{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.gc .opp{font-size:14px;font-weight:700;margin:4px 0}
.gc .gdate{font-size:11px;color:var(--muted)}
.gc .sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.sdot.upcoming{background:#bbb}
.sdot.live{background:#e74c3c;animation:pulse 1s infinite}
.sdot.complete{background:var(--g)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 7px}

.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.fi{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:14px;color:var(--text);background:#fff}
.fi:focus{outline:none;border-color:var(--g)}
textarea.fi{min-height:78px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.sbg{display:flex;gap:7px}
.sb{flex:1;padding:9px 6px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted)}
.sb.a-upcoming{background:#f0f0f0;color:#444;border-color:#aaa}
.sb.a-live{background:#fde8e8;color:#c0392b;border-color:#c0392b}
.sb.a-complete{background:var(--gl);color:var(--g);border-color:var(--g)}

.av-grid{display:flex;flex-wrap:wrap;gap:6px}
.av{padding:7px 11px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid;user-select:none}
.av.in{background:var(--gl);color:var(--g);border-color:var(--g)}
.av.out{background:#fde8e8;color:var(--red);border-color:var(--red);text-decoration:line-through}

/* ── Pitch ── */
.half-tabs{display:flex;gap:8px;margin-bottom:8px}
.formation-picker{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fp-btn{flex:1;min-width:70px;padding:7px 4px;border:1.5px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;text-align:center;display:flex;flex-direction:column;gap:2px}
.fp-btn.on{background:var(--g);border-color:var(--g)}
.fp-label{font-size:13px;font-weight:700;color:var(--text)}
.fp-desc{font-size:10px;color:var(--muted)}
.fp-btn.on .fp-label,.fp-btn.on .fp-desc{color:#fff}

/* ── Player pool ── */
.pool-wrap{background:#f7f7f7;border:1.5px solid var(--border);border-radius:8px;padding:10px 10px 8px;margin-top:8px}
.pool-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.pool-chips{display:flex;flex-wrap:wrap;gap:6px}
.pool-chip{padding:7px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;background:var(--g);color:#fff;border:2px solid transparent;user-select:none;transition:transform .1s}
.pool-chip:active{transform:scale(.95)}
.pool-chip.sel{outline:3px solid var(--g);outline-offset:2px;background:#fff;color:var(--g)}
.pool-chip.unavail{background:#7f1d1d}
.pool-empty{font-size:12px;color:var(--muted);font-style:italic}
.ht{flex:1;padding:9px;background:var(--gl);border:none;border-radius:6px;font-size:13px;font-weight:700;color:var(--g);cursor:pointer}
.ht.on{background:var(--g);color:#fff}

.swap-hint{text-align:center;font-size:12px;color:var(--muted);margin-bottom:8px;min-height:18px;transition:color .2s}
.swap-hint.active{color:var(--g);font-weight:700}

.pitch{background:#2d7a3a;border-radius:8px 8px 0 0;position:relative;height:390px;border:2px solid #1a5c28;overflow:hidden;cursor:pointer}
.pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.pslot{position:absolute;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;align-items:center}
.ptag{font-size:8px;color:rgba(255,255,255,.5);margin-bottom:2px;letter-spacing:.4px}

/* Chips */
.chip{background:var(--red);color:#fff;padding:6px 10px;border-radius:5px;font-size:12px;font-weight:700;white-space:nowrap;border:2px solid transparent;text-align:center;min-width:58px;cursor:pointer;transition:transform .1s,outline .1s;user-select:none}
.chip.gk{background:var(--gold);color:#3a1f00}
.chip.new{border-color:#ffd700}
.chip.sel{outline:3px solid #fff;outline-offset:2px;transform:scale(1.08)}
.chip.sel.gk{outline-color:#fff}
.epslot{background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.35);border-radius:5px;min-width:58px;height:32px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:10px;cursor:pointer;transition:background .15s}
.epslot.swap-target{background:rgba(255,215,0,.25);border-color:#ffd700;color:#ffd700}

/* Bench */
.bench{background:#145525;border-radius:0 0 8px 8px;padding:8px;border:2px solid #1a5c28;border-top:none;margin-bottom:12px}
.blabel{font-size:9px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.bslots{display:flex;gap:5px}
.bslot{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bslot .chip{width:100%;font-size:10px;padding:5px 3px;min-width:0;background:#1a6b2f}
.bslot .chip.sel{outline-color:#ffd700}
.bslot .epslot{width:100%;height:28px}

/* Sub-for label */
.sub-for-lbl{font-size:9px;color:rgba(255,255,255,.55);text-align:center;cursor:pointer;padding:1px 4px;border-radius:3px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}
.sub-for-lbl:active{background:rgba(255,255,255,.1)}
.sub-for-lbl.set{color:#ffd700;font-weight:700}

.print-btn-wrap{text-align:right;margin-bottom:6px}

/* Live */
.live-hd{display:flex;align-items:center;gap:10px;background:var(--g);color:#fff;padding:11px 13px;border-radius:8px;margin-bottom:12px}
.live-half-lbl{font-size:14px;font-weight:700;flex:1}
.min-box{display:flex;align-items:center;gap:6px;font-size:13px}
.min-in{width:58px;padding:5px 7px;border:none;border-radius:6px;font-size:16px;font-weight:700;text-align:center;background:rgba(255,255,255,.2);color:#fff}
.min-in::placeholder{color:rgba(255,255,255,.5)}
.half-sw{display:flex;gap:7px;margin-bottom:10px}
.hs{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
.hs.on{background:var(--g);color:#fff;border-color:var(--g)}
.on-field{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.of{display:flex;align-items:center;gap:4px;background:var(--red);color:#fff;padding:8px 11px;border-radius:20px;font-size:13px;font-weight:700}
.of.gk{background:var(--gold);color:#3a1f00}
.off-btn{background:rgba(255,255,255,.25);border:none;color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:13px;line-height:20px;text-align:center;margin-left:2px}
.act-row{display:flex;gap:8px;margin-bottom:14px}
.act{flex:1;padding:14px 6px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.act-sub{background:#2980b9;color:#fff}
.act-goal{background:#27ae60;color:#fff}
.act-switch{background:#e67e22;color:#fff}
.act-note{background:#8e44ad;color:#fff}
.ev-log{}
.ev{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.ev-min{font-size:11px;font-weight:700;color:var(--g);min-width:30px;padding-top:2px}
.ev-ico{min-width:20px;font-size:15px}
.ev-txt{flex:1;line-height:1.4}
.ev-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 4px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mb{background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:18px;max-height:85vh;overflow-y:auto}
.mt{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center}
.mc{margin-left:auto;background:none;border:none;font-size:26px;cursor:pointer;color:var(--muted);line-height:1}
.psg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.psb{padding:12px 6px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.psb.sel{background:var(--g);color:#fff;border-color:var(--g)}
.psb.na{opacity:.3;pointer-events:none}
.psb.none-opt{color:var(--muted);font-style:italic;font-size:12px}
.conf{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.conf:disabled{opacity:.4;cursor:default}
.modal-section{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 4px}

/* Report */
.pt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}
.pt-name{width:82px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-wrap{flex:1;background:#e0e0e0;border-radius:3px;height:10px}
.pt-bar{background:var(--g);height:10px;border-radius:3px}
.pt-min{width:40px;text-align:right;color:var(--muted);font-size:11px}
.stat-table{width:100%;border-collapse:collapse;font-size:13px}
.stat-table th{background:var(--g);color:#fff;padding:9px;text-align:left;font-size:11px;letter-spacing:.4px}
.stat-table td{padding:9px;border-bottom:1px solid var(--border)}
.stat-table tr:nth-child(even) td{background:var(--gl)}
.hl{font-weight:700;color:var(--g)}

.btn{padding:9px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.btn-p{background:var(--g);color:#fff}
.btn-s{background:var(--gl);color:var(--g)}
.btn-sm{padding:5px 10px;font-size:11px}
.float{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;z-index:50}
.float .btn{flex:1}
.cfg-warn{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:12px 14px;border-radius:8px;margin-bottom:14px;font-size:13px;line-height:1.5}

.chip.unavail{background:#7f1d1d;border-color:#fca5a5;border-width:2px}
.chip.unavail.sel{outline-color:#fca5a5}
.of-unavail{background:#7f1d1d!important;border:2px solid #fca5a5}

/* ── Live clock ── */
.clock-bar{display:flex;align-items:center;gap:10px;background:var(--gd);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.clock-half-sw{display:flex;gap:6px}
.clock-hs{flex:1;padding:8px 6px;border:1.5px solid rgba(255,255,255,.25);border-radius:6px;background:transparent;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);text-align:center}
.clock-hs.on{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.5)}
.clock-display{flex:1;text-align:center}
.clock-time{font-size:30px;font-weight:700;color:#fff;letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1}
.clock-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.5px}
.clock-btn{width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.clock-btn.start{background:#27ae60;color:#fff}
.clock-btn.pause{background:#e67e22;color:#fff}
.clock-btn.reset{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:16px;width:36px;height:36px;border-radius:50%;margin-left:-4px}

/* ── Live pitch ── */
.live-pitch{background:#2d7a3a;border-radius:8px 8px 0 0;position:relative;height:360px;border:2px solid #1a5c28;overflow:hidden}
.live-pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.lchip{position:absolute;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.lchip-tag{font-size:8px;color:rgba(255,255,255,.5);margin-bottom:2px}
.lchip-name{background:var(--red);color:#fff;padding:5px 9px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap;border:2px solid transparent;text-align:center;min-width:52px;transition:transform .1s}
.lchip-name.unavail{background:#7f1d1d;border-color:#fca5a5}
.lchip:active .lchip-name{transform:scale(1.08)}
.lchip-name.sub-hint{border-color:#ffd700;animation:subpulse 1.2s infinite}
@keyframes subpulse{0%,100%{border-color:#ffd700}50%{border-color:rgba(255,215,0,.3)}}
.live-bench-row{background:#145525;border-radius:0 0 8px 8px;padding:8px;border:2px solid #1a5c28;border-top:none;margin-bottom:12px}
.live-bench-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.lb-chip{background:#1a6b2f;color:#fff;padding:6px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;white-space:nowrap}
.lb-chip.unavail{background:#7f1d1d;border-color:#fca5a5}
.lb-chip:active{transform:scale(.96)}

/* ── Positions / Roster page ── */
.pos-table{width:100%;border-collapse:collapse;font-size:13px}
.pos-table th{background:var(--g);color:#fff;padding:9px 10px;text-align:left;font-size:11px;letter-spacing:.4px;white-space:nowrap}
.pos-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.pos-table tr:nth-child(even) td{background:var(--gl)}
.pos-table tr:hover td{background:#e0f0e6;cursor:pointer}
.foot-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:#e8f0fe;color:#1a56db}
.foot-badge.both{background:#fef3c7;color:#92400e}
.gk-yes{color:var(--g);font-weight:700}
.gk-open{color:#d97706;font-weight:700}
.gk-no{color:#ccc}
.pos-primary{font-weight:700;color:var(--text)}
.pos-rest{color:var(--muted);font-size:12px}
.grade-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;background:#f0f0f0;color:#555;margin-left:4px}
.edit-ico{color:#aaa;font-size:14px;float:right}
.del-btn{background:none;border:none;color:#fca5a5;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;float:right;margin-left:4px}
.del-btn:hover{color:var(--red);background:#fef2f2}
.add-player-row{display:flex;justify-content:flex-end;margin-bottom:10px}
/* roster modal form */
.rm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.rm-full{margin-bottom:10px}
.rm-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.rm-seg{display:flex;gap:6px}
.rm-seg button{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
.rm-seg button.on{background:var(--g);color:#fff;border-color:var(--g)}

/* ── Bag Tags ── */
.bt-tabs{display:flex;gap:8px;margin-bottom:14px}
.bt-tab{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);text-align:center}
.bt-tab.on{background:var(--g);color:#fff;border-color:var(--g)}
.bt-game-sel{width:100%;padding:10px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:#fff;margin-bottom:14px;font-weight:600}
.hw-alert{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:10px 12px;border-radius:8px;margin-bottom:14px;font-size:12px;line-height:1.6}
.hw-alert strong{display:block;margin-bottom:2px;font-size:13px}
.cs-banner{background:var(--gl);border:1.5px solid var(--g);color:var(--g);padding:10px 12px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.cs-banner span{font-size:13px;font-weight:700}
.tag-section{margin-bottom:18px}
.tag-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tag-icon{font-size:18px}
.tag-lbl{font-size:13px;font-weight:700}
.tag-desc{font-size:11px;color:var(--muted);margin-left:auto;text-align:right;max-width:140px;line-height:1.3}
.tag-chips{display:flex;flex-wrap:wrap;gap:6px}
.tc{padding:8px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text);user-select:none;transition:all .15s}

function clockElapsed(){ // total seconds for current half
  const h=S.liveHalf-1;
  if(S.clock.running && S.clock.startedAt!==null){
    return S.clock.elapsed[h] + Math.floor((Date.now()-S.clock.startedAt)/1000);
  }
  return S.clock.elapsed[h];
}
function clockMinute(){ return Math.floor(clockElapsed()/60); }
function clockDisplay(){
  const s=clockElapsed();
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
window.toggleClock=function(){
  const h=S.liveHalf-1;
  if(S.clock.running){
    S.clock.elapsed[h]+=Math.floor((Date.now()-S.clock.startedAt)/1000);
    S.clock.startedAt=null; S.clock.running=false;
    clearInterval(clockInterval); clockInterval=null;
  } else {
    S.clock.startedAt=Date.now(); S.clock.running=true;
    clockInterval=setInterval(tickClock,1000);
  }
  tickClock();
};
window.adjustClock=function(secs){
  const h=S.liveHalf-1;
  if(S.clock.running){
    S.clock.elapsed[h]+=Math.floor((Date.now()-S.clock.startedAt)/1000)+secs;
    S.clock.startedAt=Date.now();
  } else {
    S.clock.elapsed[h]=Math.max(0,S.clock.elapsed[h]+secs);
  }
  tickClock();
};

  const h=S.liveHalf-1;
  if(S.clock.running){ S.clock.startedAt=Date.now(); }
  S.clock.elapsed[h]=secs;
  tickClock();
};

// ── Firebase ───────────────────────────────────────────────────────────
function initFB() {
  if (!FB_OK) { render(); return; }
  try {
    firebase.initializeApp(FB_CFG);
    db = firebase.database();
    db.ref('germany-u14/games').on('value', s => {
      S.allGames = s.val() || {};
      if (S.view==='season'||S.view==='stats') render();
    });
    db.ref('germany-u14/bagtags').on('value', s => {
      S.bagTags = s.val() || {};
      if (S.view==='bagtags') render();
    });
    db.ref('germany-u14/roster').on('value', s => {
      const val = s.val();
      if (val) {
        // Firebase stores as object keyed by push id — convert to sorted array
        S.roster = Object.entries(val).map(([id,p])=>({id,...p}))
          .sort((a,b)=>a.name.localeCompare(b.name));
      } else {
        // Seed from PLAYER_DATA on first load
        S.roster = PLAYER_DATA.map(p=>({...p}));
        PLAYER_DATA.forEach(p => db.ref('germany-u14/roster').push(p));
      }
      if (S.view==='roster') render();
    });
    db.ref('germany-u14/teamName').on('value', s => {
      S.teamName = s.val() || 'Germany U14';
      render();
    });
  } catch(e) { console.error(e); }
  render();
}

function listenGame(id) {
  if (gameRef) { gameRef.off('value'); gameRef=null; }
  if (!db||!id) return;
  gameRef = db.ref(`germany-u14/games/${id}`);
  gameRef.on('value', s => {
    S.gameData = s.val() || {};
    if (S.view==='game') renderGame(document.getElementById('app'));
  });
}

function dbRemove(path){ if(db) db.ref('germany-u14/games/'+path).remove(); }

function gameCard(g) {
  const d=S.allGames[g.id]||{};
  const st=d.meta?.status||'upcoming';
  const opp=d.meta?.opponent||'TBD';
  const dt=d.meta?.date||'';
  const notes=d.meta?.notes||'';
  const notePreview=notes?notes.split('\n')[0].slice(0,40)+(notes.length>40?'…':''):'';
  const scoreStr=(st==='complete'&&d.meta?.scoreUs!==undefined)?` · ${d.meta.scoreUs}–${d.meta.scoreThem}`:'';
  return `<div class="gc ${st}" onclick="goTo('game','${g.id}')">
    <div class="gnum">${g.label}</div>
    <div class="opp">${opp}${scoreStr}</div>
    <div class="gdate">${dt||'—'}</div>
    ${notePreview?`<div style="font-size:10px;color:var(--muted);margin-top:4px;line-height:1.3;font-style:italic">${notePreview}</div>`:''}

      <span class="sdot ${st}"></span>
      <span style="font-size:10px;color:var(--muted);text-transform:capitalize">${st}</span>
    </div>
  </div>`;
}

function renderPitch(container) {
  const ln=(S.gameData.lineup||{})[S.lhalf]||{};
  const h1ln=(S.gameData.lineup||{}).h1||{};

  pitch.className='pitch';

    <rect x="1" y="1" width="298" height="388" fill="none" stroke="white" stroke-width="1.5" opacity=".4"/>
    <line x1="0" y1="195" x2="300" y2="195" stroke="white" stroke-width="1" opacity=".25"/>
    <circle cx="150" cy="195" r="36" fill="none" stroke="white" stroke-width="1" opacity=".25"/>
    <circle cx="150" cy="195" r="2" fill="white" opacity=".3"/>
    <rect x="65" y="1" width="170" height="60" fill="none" stroke="white" stroke-width="1" opacity=".25"/>
    <rect x="100" y="1" width="100" height="23" fill="none" stroke="white" stroke-width="1" opacity=".25"/>
    <rect x="65" y="329" width="170" height="60" fill="none" stroke="white" stroke-width="1" opacity=".25"/>
    <rect x="100" y="366" width="100" height="23" fill="none" stroke="white" stroke-width="1" opacity=".25"/>
  </svg>`;

  pitch.addEventListener('click', e=>{
    if(e.target===pitch||e.target.tagName==='svg'||e.target.tagName==='line'||e.target.tagName==='circle'||e.target.tagName==='rect'){
      S.selected=null; refreshHint(); renderPitch(container);
    }
  });

  posArr.forEach(pos=>{
    const name=ln[pos.id]||'';
    const isSel=S.selected&&S.selected.half===S.lhalf&&S.selected.slot===pos.id;
    const isNew=S.lhalf==='h2'&&name&&!h1starts.has(name);
    const isUnavail=name&&avail[name]===false;
    const slot=document.createElement('div'); slot.className='pslot';
    slot.style.cssText=`left:${pos.l}%;top:${pos.t}%`;
    const tag=document.createElement('div'); tag.className='ptag'; tag.textContent=pos.tag;
    const chip=makeChip(name,S.lhalf,pos.id,pos.id==='gk',isNew,isSel,container,isUnavail);
    slot.appendChild(tag); slot.appendChild(chip);
    pitch.appendChild(slot);
  });
  container.appendChild(pitch);

  // ── Bench — dynamic size based on roster minus 11 starters ──
  const rosterCount=players().length;
  const benchSize=Math.max(rosterCount-11, 0);
  const bench=document.createElement('div'); bench.className='bench';
  bench.innerHTML='<div class="blabel">Bench — tap to select · tap label below to set planned sub</div>';
  const bs=document.createElement('div'); bs.className='bslots';
  const bArr=ln.bench||[];
  const bFor=ln.benchFor||[];

  for(let i=0;i<benchSize;i++){
    const name=bArr[i]||'';
    const isSel=S.selected&&S.selected.half===S.lhalf&&S.selected.slot==='b'+i;
    const isNew=S.lhalf==='h2'&&name&&!h1starts.has(name);
    const isUnavail=name&&avail[name]===false;
    const slot=document.createElement('div'); slot.className='bslot';
    const chip=makeChip(name,S.lhalf,'b'+i,false,isNew,isSel,container,isUnavail);
    slot.appendChild(chip);
    const sf=document.createElement('div');
    const forName=bFor[i]||'';
    sf.className='sub-for-lbl'+(forName?' set':'');
    sf.textContent=forName?`→ ${forName}`:'→ set sub';
    sf.onclick=(e)=>{ e.stopPropagation(); showBenchForModal(i); };
    slot.appendChild(sf);
    bs.appendChild(slot);
  }
  bench.appendChild(bs);
  container.appendChild(bench);

  // ── Player pool — roster members not yet placed anywhere ──
  const assigned=new Set([
    ...posArr.map(p=>ln[p.id]).filter(Boolean),
    ...Array.from({length:benchSize},(_,i)=>bArr[i]||'').filter(Boolean)
  ]);
  const pool=players().filter(p=>!assigned.has(p));

  const poolWrap=document.createElement('div'); poolWrap.className='pool-wrap';
  poolWrap.innerHTML=`<div class="pool-label">Player Pool — tap to assign to a position or bench slot</div>`;

  if(!pool.length){

  } else {
    pool.forEach(p=>{
      const isSel=S.selected?.slot==='__pool__'&&S.selected.poolName===p;
      const isUnavail=avail[p]===false;
      const btn=document.createElement('button');

        refreshHint();
        renderPitch(container);
      };
      poolChips.appendChild(btn);
    });
  }
  poolWrap.appendChild(poolChips);
  container.appendChild(poolWrap);
}

function makeChip(name,half,slot,isGK,isNew,isSel,pitchContainer,isUnavail) {
  const isPoolSel=S.selected?.slot==='__pool__';
  const isRegSwapTarget=S.selected&&S.selected.slot!=='__pool__'&&!(S.selected.half===half&&S.selected.slot===slot);
  const isPlaceTarget=isPoolSel&&!(S.selected?.half===half&&S.selected?.slot===slot);

  if(!name){
    const e=document.createElement('div');
    if(isPlaceTarget){
      e.className='epslot swap-target';
      e.textContent='place here';
    } else if(isRegSwapTarget){
      e.className='epslot swap-target';
      e.textContent='swap here';
    } else {
      e.className='epslot';
      e.textContent='—';
    }
    e.onclick=()=>tapSlot(half,slot,pitchContainer);
    return e;
  }
  const c=document.createElement('div');
  c.className='chip'+(isNew?' new':'')+(isSel?' sel':'')+(isUnavail?' unavail':'');
  c.textContent=isUnavail?`${name} ⚠`:name;
  c.title=isUnavail?`${name} marked unavailable — check before playing`:'';
  c.onclick=(e)=>{ e.stopPropagation(); tapSlot(half,slot,pitchContainer); };
  return c;
}

function tapSlot(half,slot,container) {
  const pw=container||document.getElementById('pitch-wrap');

  // Pool player being placed into a slot
  if(S.selected?.slot==='__pool__'){
    const poolName=S.selected.poolName;
    const existing=getSlotPlayer(half,slot);
    setSlotPlayer(half,slot,poolName);
    // If this slot had a player, they go back to pool (just cleared — pool recalcs)
    if(existing) {
      // Also remove existing from wherever pool player came from (already unassigned, no-op)
    }
    S.selected=null;
    dbSet(`${S.gameId}/lineup`,S.gameData.lineup);
    refreshHint();
    renderPitch(pw);
    return;
  }

  // Normal swap logic
  if(!S.selected){
    // If slot is occupied, select it; if empty and no pool selection, do nothing
    if(getSlotPlayer(half,slot)){
      S.selected={half,slot};
      refreshHint();
      renderPitch(pw);
    }
  } else if(S.selected.half===half&&S.selected.slot===slot){
    S.selected=null;
    refreshHint();
    renderPitch(pw);
  } else {
    const src=S.selected; S.selected=null;
    swapPlayers(src.half,src.slot,half,slot);
  }
}

function refreshHint(){
  const h=document.getElementById('swap-hint');
  if(!h) return;
  if(S.selected?.slot==='__pool__'){
    h.className='swap-hint active';
    h.textContent=`Tap a position or bench slot to place ${S.selected.poolName}`;
  } else if(S.selected){
    h.className='swap-hint active';
    h.textContent='Now tap another player or slot to swap';
  } else {
    h.className='swap-hint';
    h.textContent='Tap a player to select · tap a position to place · tap pool below to assign';
  }
}

function getSlotPlayer(half,slot){
  const ln=(S.gameData.lineup||{})[half]||{};
  return slot[0]==='b'?(ln.bench||[])[+slot.slice(1)]||'':(ln[slot]||'');
}
function setSlotPlayer(half,slot,name){
  if(!S.gameData.lineup) S.gameData.lineup={};
  if(!S.gameData.lineup[half]) S.gameData.lineup[half]={bench:[]};
  if(slot[0]==='b'){
    if(!S.gameData.lineup[half].bench) S.gameData.lineup[half].bench=[];
    S.gameData.lineup[half].bench[+slot.slice(1)]=name;
  } else { S.gameData.lineup[half][slot]=name; }
}
function swapPlayers(sh,ss,dh,ds){
  const a=getSlotPlayer(sh,ss),b=getSlotPlayer(dh,ds);
  setSlotPlayer(sh,ss,b); setSlotPlayer(dh,ds,a);
  dbSet(`${S.gameId}/lineup`,S.gameData.lineup);
  const pw=document.getElementById('pitch-wrap');
  if(pw) renderPitch(pw);
}

// Build live position map from lineup + sub events
function buildCurrentPositions(ln, half){
  const hk=`h${half}`;
  const posArr=getPos(hk);
  const posMap={}, playerSlot={};
  posArr.forEach(pos=>{ if(ln[pos.id]){ posMap[pos.id]=ln[pos.id]; playerSlot[ln[pos.id]]=pos.id; } });
  const startMin=half===1?0:HALF, endMin=half===1?HALF:HALF*2;
  sortedEvents()
    .filter(e=>e.type==='sub'&&e.minute>=startMin&&e.minute<endMin)
    .forEach(e=>{
      const slot=e.positionSlot||playerSlot[e.playerOff]||null;
      if(e.playerOff){ delete playerSlot[e.playerOff]; if(slot) delete posMap[slot]; }
      if(e.playerOn&&slot){ posMap[slot]=e.playerOn; playerSlot[e.playerOn]=slot; }
    });
  return {posMap,playerSlot};
}

    wrap.className='lchip';
    wrap.style.cssText=`left:${pos.l}%;top:${pos.t}%`;
    wrap.innerHTML=`<div class="lchip-tag">${pos.tag}</div>
      <div class="lchip-name ${isUnavail?'unavail':''}">${name}${isUnavail?' ⚠':''}</div>`;
    wrap.onclick=()=>{
      S.modal={type:'sub',playerOff:name,playerOn:null,positionSlot:pos.id,
               minute:clockMinute(),clockSecs:clockElapsed()};
      renderApp();
    };
    pitch.appendChild(wrap);
  });

  // Fallback: players on field with no slot assignment (edge case)
  onField.forEach(p=>{
    if(playerSlot[p]) return;
    const isUnavail=avail[p]===false;
    const wrap=document.createElement('div');
    wrap.className='lchip'; wrap.style.cssText=`left:50%;top:20%`;
    wrap.innerHTML=`<div class="lchip-tag">?</div>
      <div class="lchip-name sub-hint ${isUnavail?'unavail':''}">${p}</div>`;
    wrap.onclick=()=>{
      S.modal={type:'sub',playerOff:p,playerOn:null,positionSlot:null,
               minute:clockMinute(),clockSecs:clockElapsed()};
      renderApp();
    };
    pitch.appendChild(wrap);
  });

  container.appendChild(pitch);

  const bench=document.createElement('div'); bench.className='live-bench-row';
  bench.innerHTML=`<div class="blabel" style="color:rgba(255,255,255,.6)">Bench — tap to bring on</div><div class="live-bench-chips" id="live-bench-chips"></div>`;
  container.appendChild(bench);
  const bc=bench.querySelector('#live-bench-chips');
  if(!benchPlayers.length){ bc.innerHTML='<span style="color:rgba(255,255,255,.5);font-size:12px">No bench players available</span>'; }
  benchPlayers.forEach(p=>{
    const isUnavail=avail[p]===false;
    const btn=document.createElement('button');
    btn.className='lb-chip'+(isUnavail?' unavail':'');
    btn.textContent=isUnavail?`${p} ⚠`:p;
    btn.onclick=()=>{
      S.modal={type:'sub',playerOff:null,playerOn:p,positionSlot:null,
               minute:clockMinute(),clockSecs:clockElapsed()};
      renderApp();
    };
    bc.appendChild(btn);
  });
}

window.adjustScore=function(side,delta){
  const cur=S.gameData.meta||{};
  const usVal=+(cur.scoreUs||0), themVal=+(cur.scoreThem||0);
  const upd=side==='us'
    ?{scoreUs:Math.max(0,usVal+delta),scoreThem:themVal}
    :{scoreUs:usVal,scoreThem:Math.max(0,themVal+delta)};
  S.gameData.meta={...cur,...upd};
  dbUpdate(`${S.gameId}/meta`,upd);
  renderApp();
};

window.liveScoreChange=function(){
  const us=document.getElementById('score-us')?.value;
  const them=document.getElementById('score-them')?.value;
  if(us===''||us===null) return;
  // Save interim score so it persists across renders
  const upd={scoreUs:+us,scoreThem:+(them||0)};
  S.gameData.meta={...(S.gameData.meta||{}),...upd};
  dbUpdate(`${S.gameId}/meta`,upd);
};

window.saveFinalScore=function(){
  const us=document.getElementById('score-us')?.value;
  const them=document.getElementById('score-them')?.value;
  if(us===''||us===null||them===''||them===null) return;
  const upd={scoreUs:+us, scoreThem:+them, status:'complete'};
  S.gameData.meta={...(S.gameData.meta||{}),...upd};
  dbUpdate(`${S.gameId}/meta`,upd);
  renderApp();
};

window.clearFinalScore=function(){
  if(!confirm('Edit the final score?')) return;
  const upd={scoreUs:'',scoreThem:'',status:'live'};
  S.gameData.meta={...(S.gameData.meta||{}),...upd};
  dbUpdate(`${S.gameId}/meta`,upd);
  renderApp();
};

function currentOnField(half){
  const hk=`h${half}`;
  const ln=(S.gameData.lineup||{})[hk]||{};
  const onF=new Set(getPos(hk).map(p=>ln[p.id]).filter(Boolean));
  const startMin=half===1?0:HALF, endMin=half===1?HALF:HALF*2;
  sortedEvents()
    .filter(e=>e.type==='sub'&&e.minute>=startMin&&e.minute<endMin)
    .forEach(e=>{ onF.delete(e.playerOff); if(e.playerOn) onF.add(e.playerOn); });
  return [...onF];
}

function sortedEvents(){
  return Object.entries(S.gameData.events||{})
    .map(([id,e])=>({id,...e}))
    .sort((a,b)=>a.minute-b.minute||(a.timestamp-b.timestamp));
}

function evHtml(e){
  let icon='📋',txt='';
  if(e.type==='sub'){icon='↕';txt=`<strong>${e.playerOn}</strong> on for <strong>${e.playerOff}</strong>`;}
  else if(e.type==='goal'){icon='⚽';txt=`<strong>${e.scorer}</strong> scores${e.assistedBy?` (assist: ${e.assistedBy})`:''}`;  }
  else{txt=e.text||'';}
  return `<div class="ev">
    <div class="ev-min">${e.minute}'</div>
    <div class="ev-ico">${icon}</div>
    <div class="ev-txt">${txt}</div>
    <button class="ev-del" onclick="delEvent('${e.id}')">×</button>
  </div>`;
}

window.confirmSwitch=function(){
  const m=S.modal; if(!m.playerOff||!m.playerOn) return;
  const h=S.liveHalf; const hk=`h${h}`;
  // Find slots of both players in current live state
  const ln=(S.gameData.lineup||{})[hk]||{};
  const {playerSlot}=buildCurrentPositions(ln,h);
  const slotA=playerSlot[m.playerOff], slotB=playerSlot[m.playerOn];
  if(!slotA||!slotB){ alert('Could not determine positions — try using Sub instead.'); closeModal(); return; }
  // Record as two back-to-back subs at same minute with a note
  const min=clockMinute(), secs=clockElapsed(), ts=Date.now();
  dbPush(`${S.gameId}/events`,{type:'note',minute:min,half:h,
    text:`↔ Position switch: ${m.playerOff} (${slotA}) ↔ ${m.playerOn} (${slotB})`,timestamp:ts});
  // Update lineup directly — swap slots
  if(!S.gameData.lineup[hk]) S.gameData.lineup[hk]={};
  S.gameData.lineup[hk][slotA]=m.playerOn;
  S.gameData.lineup[hk][slotB]=m.playerOff;
  dbSet(`${S.gameId}/lineup`,S.gameData.lineup);
  closeModal();
};

function buildGoalTable(goals){
  if(!goals.length) return '<div style="color:var(--muted);font-size:13px">No goals recorded</div>';
  const stats={};
  goals.forEach(g=>{
    if(!stats[g.scorer]) stats[g.scorer]={g:0,a:0};
    stats[g.scorer].g++;
    if(g.assistedBy){if(!stats[g.assistedBy]) stats[g.assistedBy]={g:0,a:0}; stats[g.assistedBy].a++;}
  });
  return `<table class="stat-table"><thead><tr><th>Player</th><th>Goals</th><th>Assists</th></tr></thead>
    <tbody>${Object.entries(stats).sort((a,b)=>b[1].g-a[1].g).map(([p,s])=>`
      <tr><td>${p}</td><td class="${s.g?'hl':''}">${s.g}</td><td class="${s.a?'hl':''}">${s.a}</td></tr>`).join('')}
    </tbody></table>`;
}

// ── Playing time ───────────────────────────────────────────────────────
function computePT(gd){
  const pt={}; players().forEach(p=>pt[p]=0);
  const ln=gd.lineup||{};
  const events=Object.values(gd.events||{}).sort((a,b)=>a.minute-b.minute||(a.timestamp-b.timestamp));
  ['h1','h2'].forEach(hk=>{
    const startMin=hk==='h1'?0:HALF, endMin=hk==='h1'?HALF:HALF*2;
    const hln=ln[hk]||{}, onF={};
    getPos(hk).forEach(pos=>{ if(hln[pos.id]) onF[hln[pos.id]]=startMin; });
    events.filter(e=>e.type==='sub'&&e.minute>=startMin&&e.minute<endMin).forEach(e=>{
      if(e.playerOff&&onF[e.playerOff]!==undefined){pt[e.playerOff]+=(e.minute-onF[e.playerOff]); delete onF[e.playerOff];}
      if(e.playerOn) onF[e.playerOn]=e.minute;
    });
    Object.entries(onF).forEach(([p,t])=>{ pt[p]+=(endMin-t); });
  });
  return pt;
}

// ── Season stats ───────────────────────────────────────────────────────
function renderStats(a){
  const totPT={},totG={},totA={},gamesP={};
  players().forEach(p=>{ totPT[p]=0;totG[p]=0;totA[p]=0;gamesP[p]=0; });
  Object.values(S.allGames).forEach(gd=>{
    if(!gd) return;
    const pt=computePT(gd);
    players().forEach(p=>{ if(pt[p]>0){ totPT[p]+=pt[p]; gamesP[p]++; } });
    Object.values(gd.events||{}).filter(e=>e.type==='goal').forEach(e=>{
      if(e.scorer) totG[e.scorer]=(totG[e.scorer]||0)+1;
      if(e.assistedBy) totA[e.assistedBy]=(totA[e.assistedBy]||0)+1;
    });
  });
  const rows=players().map(p=>({p,min:totPT[p],g:totG[p],a:totA[p],gp:gamesP[p]})).sort((a,b)=>b.min-a.min);
  a.innerHTML=`
  <div class="hd no-print">
    <button class="back-btn" onclick="goTo('season')">‹</button>
    <h1>Season Stats</h1>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title">Spring 2026 — All Players</div>
      <table class="stat-table">
        <thead><tr><th>Player</th><th>Games</th><th>Minutes</th><th>Goals</th><th>Assists</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td><strong>${r.p}</strong></td><td>${r.gp}</td>
          <td class="${r.min>0?'hl':''}">${r.min}</td>
          <td class="${r.g>0?'hl':''}">${r.g}</td>
          <td class="${r.a>0?'hl':''}">${r.a}</td></tr>`).join('')}
        </tbody></table>
    </div>
  </div>`;
}

// ── Positions view ─────────────────────────────────────────────────────

  a.innerHTML=`
  <div class="hd no-print">
    <button class="back-btn" onclick="goTo('season')">‹</button>
    <h1>👥 Player Roster</h1>
  </div>
  <div class="content">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">Team Name</div>

      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="fi" id="inp-team-name" placeholder="e.g. Germany U14" value="${S.teamName||'Germany U14'}" style="flex:1">
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">Used throughout the app — update when reusing for a new season or team.</div>
    </div>
    <div class="add-player-row">
      <button class="btn btn-p btn-sm" onclick="openRosterEdit(null)">+ Add Player</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="pos-table">

          <th>Player</th>
          <th>Foot</th>
          <th>Position Preference <span style="font-weight:400;opacity:.7">(in order)</span></th>
          <th>Goalie?</th>
        </tr></thead>
        <tbody>${rows}</tbody>

window.saveTeamName=function(){
  const name=(document.getElementById('inp-team-name')?.value||'').trim();
  if(!name){ alert('Please enter a team name.'); return; }
  S.teamName=name;
  teamNameSet(name);
  // Flash confirmation
  const btn=document.querySelector('#inp-team-name + button, .card button.btn-p');
  renderApp();
};

window.openRosterEdit=function(id){
  const p = id ? (S.roster||[]).find(r=>r.id===id) : null;
  S.modal = {
    type:'rosterEdit',
    id: id||null,
    name: p?.name||'',
    grade: p?.grade||'6th',
    foot: p?.foot||'R',
    positions: p?.positions||'',
    goalie: p?.goalie||'No',
  };
  renderApp();
};

window.deletePlayer=function(id){
  if(!id) return;
  const p=(S.roster||[]).find(r=>r.id===id);
  if(!confirm(`Remove ${p?.name||'this player'} from the roster? This cannot be undone.`)) return;
  rosterRemove(id);
};

window.saveRosterPlayer=function(){
  const m=S.modal;
  const name=(m.name||'').trim();
  if(!name){ alert('Please enter a player name.'); return; }
  const data={name,grade:m.grade,foot:m.foot,positions:m.positions,goalie:m.goalie};
  if(m.id){
    rosterSet(m.id,data);
  } else {
    rosterPush(data);
  }
  closeModal();
};

// ── Bag Tag helpers ────────────────────────────────────────────────────
function gtAwardees(gameId,tagId){ return (S.bagTags[gameId]||{})[tagId]||[]; }
function seasonAwardees(tagId){
  const all=new Set();
  Object.values(S.bagTags).forEach(g=>{ (g[tagId]||[]).forEach(p=>all.add(p)); });
  return all;
}
function playerTagCount(player,tagId){
  return Object.values(S.bagTags).reduce((n,g)=>n+((g[tagId]||[]).includes(player)?1:0),0);
}

window.toggleTag=function(gameId,tagId,player){
  if(!S.bagTags[gameId]) S.bagTags[gameId]={};
  const cur=[...(S.bagTags[gameId][tagId]||[])];
  const idx=cur.indexOf(player);
  // Guard once-per-season tags
  const tag=TAGS.find(t=>t.id===tagId);
  if(tag?.once && idx<0 && seasonAwardees(tagId).has(player)){
    alert(`${player} already has ${tag.label} this season.`); return;
  }
  if(idx>=0) cur.splice(idx,1); else cur.push(player);
  S.bagTags[gameId][tagId]=cur;
  btSet(`${gameId}/${tagId}`,cur);
  renderApp();
};

window.awardCleanSheet=function(gameId){
  if(!S.bagTags[gameId]) S.bagTags[gameId]={};
  const cur=S.bagTags[gameId]['cleanSheet']||[];
  const allOn=players().every(p=>cur.includes(p));
  const next=allOn?[]:([...players()]);
  S.bagTags[gameId]['cleanSheet']=next;
  btSet(`${gameId}/cleanSheet`,next);
  renderApp();
};

// ── Bag Tags view ──────────────────────────────────────────────────────
function renderBagTags(a){
  a.innerHTML=`
  <div class="hd no-print">
    <button class="back-btn" onclick="goTo('season')">‹</button>
    <h1>🧱 Bag Tags</h1>
  </div>
  <div class="content">
    <div class="bt-tabs">
      <button class="bt-tab ${S.btView==='award'?'on':''}" onclick="setBTView('award')">Award Tags</button>
      <button class="bt-tab ${S.btView==='grid'?'on':''}" onclick="setBTView('grid')">Season Grid</button>
    </div>
    <div id="bt-content"></div>
  </div>`;
  const c=document.getElementById('bt-content');
  if(S.btView==='award') renderBTAward(c);
  else renderBTGrid(c);
}

function renderBTAward(c){
  const gd=S.allGames[S.btGame]||{};
  const opp=gd.meta?.opponent||S.btGame;
  const isShutout=gd.meta?.scoreUs!==undefined&&+gd.meta.scoreThem===0&&gd.meta.scoreThem!=='';
  const csArr=gtAwardees(S.btGame,'cleanSheet');
  const csAllAwarded=players().every(p=>csArr.includes(p));

  // Who still needs Hardest Worker
  const hwHas=seasonAwardees('hardestWorker');
  const hwNeeds=players().filter(p=>!hwHas.has(p));

  const gameOpts=GAMES.map(g=>{
    const d=S.allGames[g.id]||{};
    const label=d.meta?.opponent?`${g.label} — ${d.meta.opponent}`:g.label;
    return `<option value="${g.id}" ${g.id===S.btGame?'selected':''}>${label}</option>`;
  }).join('');

  c.innerHTML=`
    <select class="bt-game-sel" onchange="setBTGame(this.value)">${gameOpts}</select>
    ${hwNeeds.length?`<div class="hw-alert">
      <strong>💪 Hardest Worker — ${hwNeeds.length} player${hwNeeds.length>1?'s':''} still need this tag</strong>
      ${hwNeeds.join(', ')}
    </div>`:'<div style="background:var(--gl);border:1px solid var(--g);color:var(--g);padding:8px 12px;border-radius:8px;margin-bottom:14px;font-size:12px;font-weight:700">✓ All 17 players have received Hardest Worker</div>'}
    ${isShutout&&!csAllAwarded?`<div class="cs-banner">
      <span>🧤 This was a shutout — award Clean Sheet to whole team?</span>
      <button class="btn btn-p btn-sm" onclick="awardCleanSheet('${S.btGame}')">Award All</button>
    </div>`:''}
    <div id="tag-sections"></div>`;

  const ts=document.getElementById('tag-sections');
  TAGS.forEach(tag=>{
    const sec=document.createElement('div'); sec.className='tag-section';
    const hdr=document.createElement('div'); hdr.className='tag-hdr';
    hdr.innerHTML=`<span class="tag-icon">${tag.icon}</span>
      <span class="tag-lbl">${tag.label}</span>
      <span class="tag-desc">${tag.desc}</span>`;
    sec.appendChild(hdr);

    if(tag.team){
      // Clean sheet — single button for whole team
      const btn=document.createElement('button');
      btn.className='tc'+(csAllAwarded?' team-on':'');
      btn.textContent=csAllAwarded?'✓ Awarded to whole team':'Tap to award to whole team';
      btn.onclick=()=>awardCleanSheet(S.btGame);
      sec.appendChild(btn);
    } else {
      const chips=document.createElement('div'); chips.className='tag-chips';
      const gameAwardees=gtAwardees(S.btGame,tag.id);
      const seasonHas=tag.once?seasonAwardees(tag.id):null;

      players().forEach(p=>{
        const awarded=gameAwardees.includes(p);
        // For once tags: if awarded in ANOTHER game, show as done
        const seasonDone=tag.once&&!awarded&&seasonHas?.has(p);
        const btn=document.createElement('button');
        btn.className='tc'+(awarded?' awarded':'')+(seasonDone?' done':'');
        btn.textContent=p;
        btn.title=seasonDone?`Already received ${tag.label} this season`:'';
        if(!seasonDone) btn.onclick=()=>toggleTag(S.btGame,tag.id,p);
        chips.appendChild(btn);
      });
      sec.appendChild(chips);
    }
    ts.appendChild(sec);
  });
}

function renderBTGrid(c){
  const hwHas=seasonAwardees('hardestWorker');
  // Build totals
  const totals={};
  TAGS.forEach(t=>totals[t.id]=0);

  const rows=players().map(p=>{
    const needsHW=!hwHas.has(p);
    let cells='';
    TAGS.forEach(tag=>{
      if(tag.team){
        const count=Object.values(S.bagTags).filter(g=>(g['cleanSheet']||[]).includes(p)).length;
        if(count>0) totals[tag.id]+=count;
        cells+=count?`<td class="has">${count}</td>`:`<td class="none">—</td>`;
      } else if(tag.once){
        const has=seasonAwardees(tag.id).has(p);
        if(has) totals[tag.id]++;
        cells+=has?`<td class="has">✓</td>`:`<td class="none">—</td>`;
      } else {
        const count=playerTagCount(p,tag.id);
        if(count>0) totals[tag.id]+=count;
        cells+=count?`<td class="has">${count}</td>`:`<td class="none">—</td>`;
      }
    });
    return `<tr class="${needsHW?'needshw':''}"><td class="pc">${p}${needsHW?'<span style="font-size:9px;color:#856404;margin-left:4px">needs 💪</span>':''}</td>${cells}</tr>`;
  }).join('');

  const sumCells=TAGS.map(t=>`<td>${totals[t.id]||'—'}</td>`).join('');

  c.innerHTML=`
  <div class="card" style="padding:10px">
    <div class="grid-wrap">
      <table class="bt-grid">
        <thead><tr>
          <th class="pc">Player</th>
          ${TAGS.map(t=>`<th>${t.icon}<br>${t.label.split(' ')[0]}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${rows}
          <tr class="sumrow"><td class="pc">Total</td>${sumCells}</tr>
        </tbody>
      </table>
    </div>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6">
    ✓ = awarded once &nbsp;·&nbsp; number = times awarded &nbsp;·&nbsp; yellow row = needs Hardest Worker
  </div>`;
}

// ── PWA Setup ──────────────────────────────────────────────────────────
(function(){
  // Inject manifest dynamically so it works from a single HTML file
  const manifest={
    name:'Team Manager',
    short_name:'Team Mgr',
    start_url:'./',
    display:'standalone',
    background_color:'#f0f4f1',
    theme_color:'#1a6b2f',
    icons:[
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231a6b2f"/><text y=".9em" font-size="80" x="10">⚽</text></svg>',sizes:'any',type:'image/svg+xml'}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  document.getElementById('pwa-manifest').href=url;

  // Register service worker for offline support
  if('serviceWorker' in navigator){
    const swCode=`
const CACHE='team-mgr-v1';
const ASSETS=['./'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('firebase')||e.request.url.includes('gstatic')) return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  })));
});`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
})();

initFB();
</script>
